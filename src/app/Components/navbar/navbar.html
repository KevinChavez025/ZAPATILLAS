<!-- ANNOUNCE BAR -->
<div class="announce">
  🇵🇪 Calzado infantil 100% cuero legítimo &nbsp;·&nbsp;
  <a [href]="waBase + 'Hola!%20Quiero%20cotizar%20calzado%20Piolito'">Escríbenos al WhatsApp</a>
</div>

<!-- NAV -->
<nav [class.scrolled]="isScrolled">
  <a routerLink="/" class="nav-logo" aria-label="Ir al inicio — Piolito">
    <img
      src="favicon.ico"
      alt=""
      role="presentation"
      class="piolito-logo"
    />
  </a>

  <ul class="nav-links" [class.open]="menuOpen">
    <li><a routerLink="/"            routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}" (click)="closeMenu()">Inicio</a></li>
    <li><a routerLink="/nosotros"    routerLinkActive="active"                                          (click)="closeMenu()">Nosotros</a></li>
    <li><a routerLink="/productos"   routerLinkActive="active"                                          (click)="closeMenu()">Productos</a></li>
    <li><a routerLink="/guia-tallas" routerLinkActive="active"                                          (click)="closeMenu()">Guía de Tallas</a></li>
    <li><a routerLink="/tiendas"     routerLinkActive="active"                                          (click)="closeMenu()">Fábrica</a></li>
    <li><a href="#contacto"                                                                              (click)="closeMenu()">Contacto</a></li>
  </ul>

  <div class="nav-right">
    <a
      [href]="waBase + 'Hola!%20Quiero%20cotizar%20calzado%20Piolito'"
      class="btn-wa"
      target="_blank"
      rel="noopener"
    >
      <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path [attr.d]="waIcon"/></svg>
      Solicitar cotización
    </a>

    <button
      class="hamburger"
      (click)="toggleMenu()"
      [class.open]="menuOpen"
      aria-label="Menú"
    >
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>
